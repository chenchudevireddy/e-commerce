apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app-blue
  labels:
    app: ecommerce-app
    color: blue
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce-app
      color: blue
  template:
    metadata:
      labels:
        app: ecommerce-app
        color: blue
        version: v1
    spec:
      containers:
      - name: ecommerce-app
        image: your-registry/ecommerce-app:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DEPLOYMENT_COLOR
          value: "blue"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
