apiVersion: v1
kind: Service
metadata:
  name: ecommerce-app-service
  labels:
    app: ecommerce-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: ecommerce-app
---
# Optional: LoadBalancer service for direct external access
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-app-lb
  labels:
    app: ecommerce-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: ecommerce-app
  # Optional: Health check configuration
  healthCheckNodePort: 32401