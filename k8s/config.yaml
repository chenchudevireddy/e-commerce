apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  labels:
    app: ecommerce-app
data:
  # Application configuration
  APP_NAME: "ShopHub E-Commerce"
  APP_VERSION: "1.0.0"
  NODE_ENV: "production"

  # Nginx configuration
  NGINX_WORKER_CONNECTIONS: "1024"
  NGINX_KEEPALIVE_TIMEOUT: "65"

  # Health check configuration
  HEALTH_CHECK_PATH: "/health"
  HEALTH_CHECK_INTERVAL: "30s"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  labels:
    app: ecommerce-app
type: Opaque
data:
  # Add base64 encoded secrets here
  # API_KEY: <base64-encoded-api-key>
  # DATABASE_URL: <base64-encoded-db-url>
  # JWT_SECRET: <base64-encoded-jwt-secret>
---
# Horizontal Pod Autoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecommerce-app-hpa
  labels:
    app: ecommerce-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecommerce-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
        max: 100